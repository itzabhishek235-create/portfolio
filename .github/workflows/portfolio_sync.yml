name: Automated Portfolio Stream

on:
  schedule:
    - cron: '30 18 * * *' # Runs automatically every night at 12:00 AM IST
  workflow_dispatch: # Gives you a manual run button in your browser

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Portfolio Repository
      uses: actions/checkout@v4

    - name: Set Up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Rebuild Project Index JSON
      env:
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        PORTFOLIO_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python update_projects.py

    - name: Commit and Push Changes Automatically
      run: |
        if git diff --quiet projects.json; then
          echo "No changes detected in repository assets. Skipping push operations."
        else
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add projects.json
          git commit -m "chore: automated background portfolio projects sync [skip ci]"
          git push
        fi